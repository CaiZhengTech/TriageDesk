[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = ["alembic/versions"]  # autogenerated migration scripts

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008"]  # FastAPI's Depends(...) in argument defaults is idiomatic

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = ["integration: hits the Neon test branch"]
# Bare `pytest` (as CI runs it) does not put the project root on sys.path the way
# `python -m pytest` does; without this, `import triagedesk` fails on the runner.
pythonpath = ["."]
